name: Build & Push Docker 2tag image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker 镜像的版本标签 (例如: 1.2.3)'
        required: true
        default: ''
        type: string
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            os: ubuntu-latest
          - platform: linux/arm64
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Prepare platform name
        run: |
          echo "PLATFORM_NAME=$(echo '${{ matrix.platform }}' | sed 's|/|-|g')" >> $GITHUB_ENV

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repository owner
        id: lowercase
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.lowercase.outputs.owner }}/lunatv

      # --- [ 这是核心修正部分 ] ---
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          # 修正：即使是按摘要推送，也需要一个 "临时" 标签来指定目标仓库。
          # 我们使用 Git SHA 和 platform 来确保它的唯一性。
          # 这个标签最终不会被用户看到，因为它会被 merge 任务中的 manifest list 标签覆盖。
          tags: ghcr.io/${{ steps.lowercase.outputs.owner }}/lunatv:build-${{ github.sha }}-${{ env.PLATFORM_NAME }}
          outputs: type=image,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          echo "Digest for ${{ matrix.platform }} is ${digest}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_NAME }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # merge 和 cleanup-refresh 任务保持不变，它们已经是正确的
  merge:
    runs-on: ubuntu-latest
    needs:
      - build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repository owner
        id: lowercase
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
        
      - name: Prepare tags for manifest
        id: manifest_tags
        run: |
          IMAGE_NAME="ghcr.io/${{ steps.lowercase.outputs.owner }}/lunatv"
          BASE_TAG="${{ github.event.inputs.tag || 'latest' }}"
          echo "Base tag is: ${BASE_TAG}"
          
          TAG_ARGS="-t ${IMAGE_NAME}:${BASE_TAG}"
          
          if [ "${BASE_TAG}" != "latest" ]; then
            echo "Adding 'latest' tag as well."
            TAG_ARGS="$TAG_ARGS -t ${IMAGE_NAME}:latest"
          fi
          
          echo "Final tag arguments: ${TAG_ARGS}"
          echo "tags=${TAG_ARGS}" >> $GITHUB_OUTPUT

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          if [ -z "$(ls -A .)" ]; then
            echo "No digests found to create manifest. Exiting."
            exit 1
          fi
          echo "Creating manifest with tags: ${{ steps.manifest_tags.outputs.tags }}"
          docker buildx imagetools create ${{ steps.manifest_tags.outputs.tags }} \
            $(printf 'ghcr.io/${{ steps.lowercase.outputs.owner }}/lunatv@sha256:%s ' *)

  cleanup-refresh:
    runs-on: ubuntu-latest
    needs:
      - merge
    if: always()
    steps:
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 2
